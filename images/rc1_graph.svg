<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="Molecular graph mapped to a property by QSPR regression">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0e1c33"/><stop offset="1" stop-color="#1b3a63"/></linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg1)"/>
  <text x="200" y="24" text-anchor="middle" fill="#eaf1fb" font-family="Georgia, serif" font-size="14">Molecular graph &#8594; Topological index &#8594; Property</text>
  <line x1="200" y1="38" x2="200" y2="185" stroke="#2c5580" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- LEFT: molecular graph -->
  <g stroke="#5b7ba6" stroke-width="2">
    <line x1="70" y1="70" x2="110" y2="60"/><line x1="110" y1="60" x2="140" y2="90"/>
    <line x1="140" y1="90" x2="120" y2="130"/><line x1="120" y1="130" x2="78" y2="130"/>
    <line x1="78" y1="130" x2="58" y2="95"/><line x1="58" y1="95" x2="70" y2="70"/>
    <line x1="140" y1="90" x2="172" y2="82"/>
  </g>
  <g fill="#14b8a1" stroke="#0a1526" stroke-width="1">
    <circle cx="70" cy="70" r="8"/><circle cx="110" cy="60" r="8"/><circle cx="140" cy="90" r="9" fill="#c9a24a"/>
    <circle cx="120" cy="130" r="8"/><circle cx="78" cy="130" r="8"/><circle cx="58" cy="95" r="8"/>
    <circle cx="172" cy="82" r="7" fill="#7dd3fc"/>
  </g>
  <text x="150" y="88" fill="#fff" font-family="sans-serif" font-size="9" text-anchor="middle">d=3</text>
  <text x="118" y="20" fill="#9fb6d6" font-family="sans-serif" font-size="10" text-anchor="middle"></text>

  <!-- RIGHT: QSPR regression -->
  <g stroke="#3a5a86" stroke-width="1.5"><line x1="232" y1="55" x2="232" y2="170"/><line x1="232" y1="170" x2="378" y2="170"/></g>
  <line x1="240" y1="162" x2="372" y2="72" stroke="#c9a24a" stroke-width="2.5" stroke-dasharray="6 4"/>
  <g fill="#7dd3fc">
    <circle cx="248" cy="156" r="3.5"/><circle cx="270" cy="146" r="3.5"/><circle cx="292" cy="132" r="3.5"/>
    <circle cx="312" cy="118" r="3.5"/><circle cx="334" cy="100" r="3.5"/><circle cx="358" cy="82" r="3.5"/>
  </g>
  <text x="305" y="188" text-anchor="middle" fill="#9fb6d6" font-family="sans-serif" font-size="11">topological index</text>
  <text x="224" y="112" fill="#9fb6d6" font-family="sans-serif" font-size="11" transform="rotate(-90 224 112)" text-anchor="middle">property</text>
  <text x="300" y="66" fill="#c9a24a" font-family="Georgia, serif" font-style="italic" font-size="12">R&#178; fit</text>
</svg>

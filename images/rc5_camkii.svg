<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="Bistable double-well potential of a memory switch">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0e1c33"/><stop offset="1" stop-color="#1b3a63"/></linearGradient>
    <marker id="ah5" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#c9a24a"/></marker>
  </defs>
  <rect width="400" height="200" fill="url(#bg5)"/>
  <text x="200" y="24" text-anchor="middle" fill="#eaf1fb" font-family="Georgia, serif" font-size="14">Two stable states separated by a threshold</text>
  <g stroke="#3a5a86" stroke-width="1.5"><line x1="45" y1="45" x2="45" y2="175"/><line x1="45" y1="175" x2="380" y2="175"/></g>
  <!-- double well -->
  <path d="M60 70 C120 70 128 150 175 150 C210 150 205 96 212 96 C219 96 214 150 250 150 C300 150 305 70 365 70"
        fill="none" stroke="#14b8a1" stroke-width="3"/>
  <!-- balls -->
  <circle cx="175" cy="150" r="9" fill="#c9a24a" stroke="#fff" stroke-width="1.5"/>
  <circle cx="250" cy="150" r="9" fill="#7dd3fc" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <!-- threshold -->
  <line x1="212" y1="60" x2="212" y2="150" stroke="#e5533c" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="212" y="52" text-anchor="middle" fill="#e5843c" font-family="sans-serif" font-size="10">threshold</text>
  <text x="150" y="170" text-anchor="middle" fill="#c9a24a" font-family="sans-serif" font-size="11">ON &#183; stored</text>
  <text x="285" y="170" text-anchor="middle" fill="#9fb6d6" font-family="sans-serif" font-size="11">OFF &#183; erased</text>
  <text x="34" y="112" fill="#9fb6d6" font-family="sans-serif" font-size="11" transform="rotate(-90 34 112)" text-anchor="middle">energy</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="PyTIE computes topological descriptors from a molecular graph">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0e1c33"/><stop offset="1" stop-color="#173350"/></linearGradient>
    <marker id="ah6" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#14b8a1"/></marker>
  </defs>
  <rect width="400" height="200" fill="url(#bg6)"/>
  <text x="200" y="22" text-anchor="middle" fill="#eaf1fb" font-family="Georgia, serif" font-size="14">Open code: Structure &#8594; Descriptors</text>
  <!-- molecular graph input -->
  <g stroke="#5b7ba6" stroke-width="2">
    <line x1="45" y1="80" x2="75" y2="65"/><line x1="75" y1="65" x2="95" y2="95"/>
    <line x1="95" y1="95" x2="70" y2="120"/><line x1="70" y1="120" x2="45" y2="105"/><line x1="45" y1="105" x2="45" y2="80"/>
  </g>
  <g fill="#14b8a1"><circle cx="45" cy="80" r="6"/><circle cx="75" cy="65" r="6" fill="#c9a24a"/><circle cx="95" cy="95" r="6"/><circle cx="70" cy="120" r="6" fill="#7dd3fc"/><circle cx="45" cy="105" r="6"/></g>
  <line x1="108" y1="95" x2="140" y2="95" stroke="#14b8a1" stroke-width="2.5" marker-end="url(#ah6)"/>
  <!-- terminal -->
  <rect x="150" y="42" width="215" height="118" rx="8" fill="#0a1526" stroke="#2c5580" stroke-width="1.5"/>
  <circle cx="164" cy="56" r="3.5" fill="#e5533c"/><circle cx="176" cy="56" r="3.5" fill="#c9a24a"/><circle cx="188" cy="56" r="3.5" fill="#14b8a1"/>
  <line x1="150" y1="66" x2="365" y2="66" stroke="#2c5580" stroke-width="1.2"/>
  <text x="162" y="88" fill="#14b8a1" font-family="monospace" font-size="12">&gt;&gt;&gt; import pytie</text>
  <text x="162" y="106" fill="#7dd3fc" font-family="monospace" font-size="12">index = 12.47</text>
  <text x="162" y="124" fill="#7dd3fc" font-family="monospace" font-size="12">entropy = 3.08</text>
  <!-- mini bar chart -->
  <g fill="#c9a24a">
    <rect x="162" y="146" width="10" height="8"/><rect x="178" y="140" width="10" height="14"/>
    <rect x="194" y="134" width="10" height="20"/><rect x="210" y="128" width="10" height="26"/>
  </g>
  <text x="300" y="152" fill="#8aa2c4" font-family="Georgia, serif" font-style="italic" font-size="12">PyTIE</text>
</svg>
